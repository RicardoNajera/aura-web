    <a href="index.html" class="aura-brand-anim">AURA</a>
    
    <div class="nav-links">
        <a href="index.html" class="menu-item">Home</a>
        <a href="index.html#servicios" class="menu-item">Sistemas</a>
        <a href="nosotros.html" class="menu-item">Concepto</a>
    </div>
    
    <a href="https://wa.me/9861197993" class="btn-contact">Contáctanos</a>
</nav>

<style>
    :root {
        --blue-aura: #60a5fa;
        --purple-aura: #c084fc;
    }

    #main-nav {
        position: fixed;
        top: 0; left: 0; width: 100%;
        z-index: 1000;
        padding: 20px 5%;
        background: transparent;
        display: flex;
        flex-wrap: wrap; /* Clave para el salto de renglón en móvil */
        justify-content: space-between;
        align-items: center;
        box-sizing: border-box;
        backdrop-filter: blur(10px);
        transition: all 0.4s ease;
    }

    /* Cambio visual al hacer scroll */
    #main-nav.scrolled {
        background: rgba(0, 0, 0, 0.9);
        padding: 12px 5%;
    }

    /* LOGO */
    .aura-brand-anim {
        background: linear-gradient(90deg, var(--blue-aura), var(--purple-aura), var(--blue-aura));
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: aura-flow 4s linear infinite;
        font-weight: 900;
        font-style: italic;
        font-size: 1.5rem;
        letter-spacing: -0.05em;
        text-decoration: none;
        order: 1; /* Primero en el orden */
    }

    @keyframes aura-flow { to { background-position: 200% center; } }

    /* NAVEGACIÓN (LOS LINKS) */
    .nav-links {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        width: 100%; /* En móvil ocupa todo el ancho para forzar el renglón abajo */
        order: 3;    /* En móvil se va al final (abajo) */
        padding-top: 15px;
        margin-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .menu-item {
        font-size: 10px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        transition: 0.3s;
    }

    .menu-item:hover { color: #fff; }

    /* BOTÓN */
    .btn-contact {
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 0.6rem 1.2rem;
        border-radius: 50px;
        color: white;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.05);
        order: 2; /* En móvil se queda a la derecha del logo */
    }

    /* REGLAS PARA PANTALLAS GRANDES (PC) */
    @media (min-width: 850px) {
        #main-nav {
            flex-wrap: nowrap; /* Todo en una sola fila */
            padding: 24px 5%;
        }

        .nav-links {
            width: auto;
            order: 2; /* Pasa al medio */
            padding-top: 0;
            margin-top: 0;
            border-top: none;
            position: absolute; /* Centrado perfecto respecto a la pantalla */
            left: 50%;
            transform: translateX(-50%);
        }

        .btn-contact {
            order: 3; /* Pasa a la derecha */
            font-size: 10px;
        }
    }
</style>

<script>
    (function() {
        const nav = document.getElementById('main-nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 30) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
    })();
</script>
