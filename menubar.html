    </div>

        <div class="menu-toggle" id="mobile-menu">
            <span></span>

        </div>
    </div>
</nav>

<style>
    :root {
        --blue-aura: #60a5fa;
        --purple-aura: #c084fc;
        --glass-bg: rgba(10, 10, 15, 0.85);
        --glass-border: rgba(255, 255, 255, 0.12);
    }

    #main-nav {
        position: fixed;
        top: 0; left: 0; width: 100%;
        z-index: 1000;
        padding: 0 4%; /* Padding lateral fijo */
        height: 80px; /* Altura fija para evitar saltos */
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-bottom: 1px solid var(--glass-border);
    }

    .aura-brand-anim {
        background: linear-gradient(90deg, #fff, var(--blue-aura), var(--purple-aura), #fff);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: aura-flow 5s linear infinite;
        font-weight: 900;
        font-size: 1.5rem;
        text-decoration: none;
        flex-shrink: 0; /* Prohibido encogerse */
    }

    /* CONTENEDOR DE LINKS: FORZADO A UNA FILA */
    .nav-links {
        display: flex;
        flex-direction: row !important; /* Siempre fila */
        align-items: center;
        justify-content: center;
        gap: clamp(10px, 1.8vw, 25px); /* Espacio dinámico que se adapta al ancho */
        flex-wrap: nowrap !important; /* PROHIBIDO HACER 2 FILAS */
        margin: 0 20px;
    }

    .menu-item {
        font-size: clamp(9px, 0.7vw, 11px); /* Fuente fluida según el monitor */
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        white-space: nowrap; /* Evita que las palabras se corten */
        transition: color 0.3s ease;
    }

    .menu-item:hover { color: #fff; }

    .nav-actions {
        display: flex;
        align-items: center;
        gap: 15px;
        flex-shrink: 0;
    }

    .btn-contact {
        font-size: 10px;
        font-weight: 800;
        padding: 0.7rem 1.5rem;
        border-radius: 50px;
        color: white;
        text-decoration: none;
        background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
        border: 1px solid rgba(255, 255, 255, 0.2);
        white-space: nowrap;
    }

    .menu-toggle { display: none; }

    /* RESPONSIVO: Solo cuando el monitor es realmente pequeño (Tablets/Móvil) */
    @media (max-width: 1100px) {
        .nav-links {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; height: 100vh;
            background: var(--glass-bg);
            flex-direction: column !important; /* Aquí sí permitimos columna para el menú móvil */
            gap: 2.5rem;
            margin: 0;
            backdrop-filter: blur(30px);
            transition: 0.4s ease;
        }

        .nav-links.active { right: 0; }
        .menu-item { font-size: 16px; }
        .menu-toggle { display: block; cursor: pointer; }
        .menu-toggle span { display: block; width: 25px; height: 2px; background: #fff; margin: 5px 0; }
        .btn-contact { display: none; }
    }

    @keyframes aura-flow { to { background-position: 200% center; } }
</style>

<script>
    const menuToggle = document.getElementById('mobile-menu');
    const navLinks = document.getElementById('nav-links');

    menuToggle.addEventListener('click', () => {
        navLinks.classList.toggle('active');
    });

    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => navLinks.classList.remove('active'));
    });
</script>
