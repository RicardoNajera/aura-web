<style>
    :root {
        --blue-aura: #60a5fa;
        --purple-aura: #c084fc;
    }

    /* 1. Logo Animado con Gradiente Fluido */
    .aura-brand-anim {
        background: linear-gradient(90deg, var(--blue-aura), var(--purple-aura), var(--blue-aura));
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: aura-flow 4s linear infinite;
        font-weight: 900;
        font-style: italic;
        font-size: clamp(1.2rem, 4vw, 1.5rem); /* Tamaño adaptativo */
        letter-spacing: -0.05em;
        text-shadow: 0 0 15px rgba(96, 165, 250, 0.2);
    }

    @keyframes aura-flow { to { background-position: 200% center; } }

    /* 2. Estructura de Navegación */
    #main-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0; left: 0; width: 100%;
        z-index: 1000;
        padding: 24px 5%; /* Padding porcentual para adaptación */
        background: transparent;
    }

    /* 3. Wrapper de Links (Ocultamiento Inteligente) */
    .nav-links-wrapper {
        display: flex;
        gap: 2.5rem;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }

    .menu-item {
        font-size: 10px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.3em;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        transition: all 0.3s ease;
        white-space: nowrap;
    }

    .menu-item:hover { color: #fff; text-shadow: 0 0 8px rgba(255, 255, 255, 0.3); }

    /* 4. Botón de Contacto Dinámico */
    .btn-contact {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0.8rem 2rem;
        border-radius: 9999px;
        color: white;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .btn-contact:hover {
        background: white;
        color: black;
        box-shadow: 0 10px 30px rgba(96, 165, 250, 0.3);
    }

    /* 5. BREAKPOINTS: La clave de la adaptabilidad */
    
    /* En tablets y laptops pequeñas, reducimos el espacio entre links */
    @media (max-width: 1024px) {
        .nav-links-wrapper { gap: 1.5rem; }
    }

    /* En móviles, ocultamos los links de texto para evitar el amontonamiento */
    @media (max-width: 768px) {
        #main-nav { padding: 15px 6%; }
        .nav-links-wrapper { display: none; } /* Limpieza total del centro */
        .btn-contact { padding: 0.6rem 1.5rem; font-size: 9px; }
    }
</style>

<nav id="main-nav">
    <a href="index.html" class="aura-brand-anim">AURA</a>
    
    <div class="nav-links-wrapper">
        <a href="index.html" class="menu-item">Home</a>
        <a href="index.html#servicios" class="menu-item">Sistemas</a>
        <a href="nosotros.html" class="menu-item">Concepto</a>
    </div>

    <a href="https://wa.me/9861197993" class="btn-contact">
        Contáctanos
    </a>
</nav>

<script>
    (function() {
        const nav = document.getElementById('main-nav');
        
        function updateNav() {
            if (!nav) return;
            if (window.scrollY > 40) {
                nav.style.background = "rgba(0, 0, 0, 0.8)";
                nav.style.backdropFilter = "blur(15px)";
                nav.style.paddingTop = "12px";
                nav.style.paddingBottom = "12px";
                nav.style.borderBottom = "1px solid rgba(255, 255, 255, 0.1)";
            } else {
                nav.style.background = "transparent";
                nav.style.backdropFilter = "none";
                nav.style.paddingTop = "24px";
                nav.style.paddingBottom = "24px";
                nav.style.borderBottom = "none";
            }
        }

        setTimeout(() => {
            if(nav) nav.style.transition = "all 0.4s cubic-bezier(0.23, 1, 0.32, 1)";
        }, 100);

        window.addEventListener('scroll', updateNav);
        updateNav();
    })();
</script>
