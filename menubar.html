<style>
    :root {
        --blue-aura: #60a5fa;
        --purple-aura: #c084fc;
    }

    /* 1. Logo Animado Adaptativo */
    .aura-brand-anim {
        background: linear-gradient(90deg, var(--blue-aura), var(--purple-aura), var(--blue-aura));
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: aura-flow 4s linear infinite;
        font-weight: 900;
        font-style: italic;
        font-size: clamp(1.2rem, 5vw, 1.5rem);
        letter-spacing: -0.05em;
        text-shadow: 0 0 15px rgba(96, 165, 250, 0.2);
        z-index: 1100;
    }

    @keyframes aura-flow { to { background-position: 200% center; } }

    /* 2. Estructura de Navegación */
    #main-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0; left: 0; width: 100%;
        z-index: 1000;
        padding: 24px 5%;
        background: transparent;
    }

    /* 3. Links de Escritorio */
    .nav-links-wrapper {
        display: flex;
        gap: 2.5rem;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }

    .menu-item {
        font-size: 10px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.3em;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        transition: all 0.3s ease;
        white-space: nowrap;
    }

    .menu-item:hover { color: #fff; text-shadow: 0 0 8px rgba(255, 255, 255, 0.3); }

    /* 4. Botón de Contacto Dinámico */
    .btn-contact {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0.8rem 2rem;
        border-radius: 9999px;
        color: white;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    /* 5. Icono de Menú Móvil (Hamburguesa) */
    .mobile-menu-toggle {
        display: none;
        flex-direction: column;
        gap: 6px;
        cursor: pointer;
        z-index: 1100;
        padding: 10px;
    }

    .bar {
        width: 25px;
        height: 2px;
        background-color: white;
        transition: 0.4s;
        border-radius: 2px;
    }

    /* 6. Overlay del Menú Móvil */
    .mobile-overlay {
        position: fixed;
        top: 0; right: -100%; width: 100%; height: 100vh;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 3rem;
        transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        z-index: 1050;
    }

    .mobile-overlay.active { right: 0; }

    /* 7. ADAPTABILIDAD (BREAKPOINTS) */
    @media (max-width: 1024px) {
        .nav-links-wrapper { gap: 1.5rem; }
    }

    @media (max-width: 850px) {
        .nav-links-wrapper { display: none; }
        .mobile-menu-toggle { display: flex; }
        .btn-contact { display: none; } /* Oculto en nav para dar espacio, se mueve al overlay */
    }

    /* Animación del icono al abrir */
    .active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .active .bar:nth-child(2) { opacity: 0; }
    .active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
</style>

<nav id="main-nav">
    <a href="index.html" class="aura-brand-anim">AURA</a>
    
    <div class="nav-links-wrapper">
        <a href="index.html" class="menu-item">Home</a>
        <a href="index.html#servicios" class="menu-item">Sistemas</a>
        <a href="nosotros.html" class="menu-item">Concepto</a>
    </div>

    <a href="https://wa.me/9861197993" class="btn-contact">Contáctanos</a>

    <div class="mobile-menu-toggle" id="mobile-toggle">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
</nav>

<div class="mobile-overlay" id="mobile-menu">
    <a href="index.html" class="menu-item" style="font-size: 1.5rem;">Home</a>
    <a href="index.html#servicios" class="menu-item" style="font-size: 1.5rem;">Sistemas</a>
    <a href="nosotros.html" class="menu-item" style="font-size: 1.5rem;">Concepto</a>
    <a href="https://wa.me/9861197993" class="btn-contact" style="display: block; font-size: 1rem;">Contáctanos</a>
</div>

<script>
    (function() {
        const nav = document.getElementById('main-nav');
        const toggle = document.getElementById('mobile-toggle');
        const menu = document.getElementById('mobile-menu');
        const menuLinks = document.querySelectorAll('.mobile-overlay .menu-item');

        // Función Scroll
        function updateNav() {
            if (window.scrollY > 40) {
                nav.style.background = "rgba(0, 0, 0, 0.8)";
                nav.style.backdropFilter = "blur(15px)";
                nav.style.paddingTop = "12px";
                nav.style.paddingBottom = "12px";
                nav.style.borderBottom = "1px solid rgba(255, 255, 255, 0.1)";
            } else {
                nav.style.background = "transparent";
                nav.style.backdropFilter = "none";
                nav.style.paddingTop = "24px";
                nav.style.paddingBottom = "24px";
                nav.style.borderBottom = "none";
            }
        }

        // Toggle Menú Móvil
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('active');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        });

        // Cerrar menú al hacer clic en un link
        menuLinks.forEach(link => {
            link.addEventListener('click', () => {
                toggle.classList.remove('active');
                menu.classList.remove('active');
                document.body.style.overflow = 'auto';
            });
        });

        setTimeout(() => {
            if(nav) nav.style.transition = "all 0.4s cubic-bezier(0.23, 1, 0.32, 1)";
        }, 100);

        window.addEventListener('scroll', updateNav);
        updateNav();
    })();
</script>
