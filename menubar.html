<style>
    .aura-logo-static {
        background: linear-gradient(90deg, #60a5fa, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 900;
    }
    /* Sin transiciones lentas ni efectos raros */
    .nav-link {
        color: #9ca3af;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.3em;
        font-weight: 700;
        transition: color 0.2s;
    }
    .nav-link:hover { color: #fff; }
</style>

<nav id="main-nav" class="fixed w-full z-50 py-6 px-6 md:px-20 grid grid-cols-3 items-center bg-transparent">
    
    <div class="flex justify-start">
        <a href="index.html" class="text-2xl tracking-tighter aura-logo-static italic">AURA</a>
    </div>
    
    <div class="flex justify-center space-x-10">
        <a href="index.html" class="nav-link">Home</a>
        <a href="index.html#servicios" class="nav-link">Sistemas</a>
        <a href="nosotros.html" class="nav-link">Concepto</a>
    </div>

    <div class="flex justify-end">
        <a href="https://wa.me/9861197993" class="text-[10px] font-bold uppercase tracking-widest border border-white/20 px-8 py-3 rounded-full hover:bg-white hover:text-black transition-colors">
            CONTÁCTANOS
        </a>
    </div>
</nav>

<script>
    // Solo cambia el fondo a negro sólido al bajar, sin efectos de blur pesados
    window.addEventListener('scroll', function() {
        const nav = document.getElementById('main-nav');
        if (window.scrollY > 50) {
            nav.style.backgroundColor = "#000";
            nav.style.paddingTop = "15px";
            nav.style.paddingBottom = "15px";
        } else {
            nav.style.backgroundColor = "transparent";
            nav.style.paddingTop = "24px";
            nav.style.paddingBottom = "24px";
        }
    });
</script>
