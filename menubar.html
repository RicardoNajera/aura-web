<style>
    /* 1. Animación del Logo: Azul Aura a Morado Aura */
    .aura-brand-anim {
        background: linear-gradient(90deg, #60a5fa, #c084fc, #60a5fa);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: aura-flow 4s linear infinite;
        font-weight: 900;
        font-style: italic;
        font-size: 1.5rem;
        letter-spacing: -0.05em;
        text-shadow: 0 0 15px rgba(96, 165, 250, 0.2);
    }

    @keyframes aura-flow {
        to { background-position: 200% center; }
    }

    /* 2. Estructura Matemática: 3 Columnas */
    #main-nav {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        /* Quitamos el transition inicial para que no parpadee al entrar */
    }

    /* 3. Menús del Centro */
    .nav-links-wrapper {
        display: flex;
        gap: 2.5rem;
    }

    .menu-item {
        font-size: 10px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.3em;
        color: #6b7280;
        text-decoration: none;
        transition: color 0.2s;
    }

    .menu-item:hover {
        color: #ffffff;
    }

    /* 4. Botón a la derecha */
    .btn-contact {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 0.75rem 2rem;
        border-radius: 9999px;
        color: white;
        text-decoration: none;
        transition: all 0.2s;
    }

    .btn-contact:hover {
        background: white;
        color: black;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }
</style>

<nav id="main-nav" class="fixed w-full z-50 py-6 px-6 md:px-20 bg-transparent">
    
    <div class="flex justify-start">
        <a href="index.html" class="aura-brand-anim">AURA</a>
    </div>
    
    <div class="nav-links-wrapper">
        <a href="index.html" class="menu-item">Home</a>
        <a href="index.html#servicios" class="menu-item">Sistemas</a>
        <a href="nosotros.html" class="menu-item">Concepto</a>
    </div>

    <div class="flex justify-end">
        <a href="https://wa.me/9861197993" class="btn-contact">
            CONTÁCTANOSx
        </a>
    </div>
</nav>

<script>
    // Función de control de scroll
    function checkScroll() {
        const nav = document.getElementById('main-nav');
        if (!nav) return;

        if (window.scrollY > 30) {
            nav.style.background = "rgba(0, 0, 0, 0.9)";
            nav.style.paddingTop = "15px";
            nav.style.paddingBottom = "15px";
            nav.style.borderBottom = "1px solid rgba(255,255,255,0.05)";
        } else {
            nav.style.background = "transparent";
            nav.style.paddingTop = "24px";
            nav.style.paddingBottom = "24px";
            nav.style.borderBottom = "none";
        }
    }

    // Activa la transición DESPUÉS de la carga inicial para evitar el "efecto feo"
    setTimeout(() => {
        const nav = document.getElementById('main-nav');
        if(nav) nav.style.transition = "all 0.3s ease";
    }, 100);

    window.addEventListener('scroll', checkScroll);
    checkScroll(); // Ejecución inmediata al cargar
</script>
