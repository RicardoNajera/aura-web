<style>
    /* Animación del Gradiente para el Logo */
    .aura-logo-animated {
        background: linear-gradient(
            90deg, 
            #60a5fa, /* Azul Aura */
            #c084fc, /* Morado Aura */
            #60a5fa  /* Cierra el ciclo en azul */
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: aura-flow 3s linear infinite;
        text-shadow: 0 0 20px rgba(96, 165, 250, 0.3); /* Brillo sutil inmersivo */
    }

    @keyframes aura-flow {
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
    }

    /* Efecto hover inmersivo para los links */
    .nav-link-glow:hover {
        color: white;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }
</style>

<nav id="main-nav" class="fixed w-full z-50 py-6 px-6 md:px-20 flex justify-between items-center bg-transparent transition-all duration-700">
    
    <a href="index.html" class="text-2xl font-black tracking-tighter aura-logo-animated italic">
        AURA
    </a>
    
    <div class="hidden md:flex space-x-12 text-[10px] uppercase tracking-[0.3em] font-bold text-gray-500">
        <a href="index.html" class="nav-link-glow transition">Home</a>
        <a href="index.html#servicios" class="nav-link-glow transition">Sistemas</a>
    </div>

    <div class="flex items-center space-x-8">
        <a href="https://wa.me/9861197993" class="text-[10px] uppercase tracking-widest border border-white/10 px-8 py-3 rounded-full hover:bg-white hover:text-black hover:shadow-[0_0_20px_rgba(255,255,255,0.2)] transition duration-500">
            Inquire
        </a>
        
        <a href="nosotros.html" class="text-[10px] uppercase tracking-[0.3em] font-bold text-gray-500 nav-link-glow transition">
            Concepto
        </a>
    </div>
</nav>

<script>
    window.addEventListener('scroll', function() {
        const nav = document.getElementById('main-nav');
        if (window.scrollY > 50) {
            nav.classList.add('bg-black/60', 'backdrop-blur-xl', 'py-4', 'border-b', 'border-white/5');
            nav.classList.remove('py-6');
        } else {
            nav.classList.remove('bg-black/60', 'backdrop-blur-xl', 'py-4', 'border-b', 'border-white/5');
            nav.classList.add('py-6');
        }
    });
</script>
