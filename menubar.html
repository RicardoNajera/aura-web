<style>
    :root {
        --blue-aura: #60a5fa;
        --purple-aura: #c084fc;
        --glass-bg: rgba(10, 10, 15, 0.8);
        --glass-border: rgba(255, 255, 255, 0.12);
    }

    #main-nav {
        position: fixed;
        top: 0; left: 0; width: 100%;
        z-index: 1000;
        padding: 15px 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-bottom: 1px solid var(--glass-border);
        transition: all 0.4s ease;
    }

    .aura-brand-anim {
        background: linear-gradient(90deg, #fff, var(--blue-aura), var(--purple-aura), #fff);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: aura-flow 5s linear infinite;
        font-weight: 900;
        font-size: 1.4rem;
        text-decoration: none;
        z-index: 1100;
    }

    /* ESTADO MÓVIL POR DEFECTO */
    .nav-links {
        position: fixed;
        top: 0; right: -100%; /* Oculto a la derecha */
        width: 100%; height: 100vh;
        background: var(--glass-bg);
        backdrop-filter: blur(30px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2.5rem;
        transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1050;
    }

    .nav-links.active { right: 0; }

    .menu-item {
        font-size: 14px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.3em;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
    }

    /* BOTÓN HAMBURGUESA */
    .menu-toggle {
        display: block;
        cursor: pointer;
        z-index: 1100;
        width: 30px;
    }

    .menu-toggle span {
        display: block;
        width: 100%; height: 2px;
        background: #fff;
        margin: 6px 0;
        transition: 0.3s;
    }

    /* Animación X del menú */
    .menu-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .menu-toggle.open span:nth-child(2) { opacity: 0; }
    .menu-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(6px, -7px); }

    .btn-contact {
        display: none; /* Se oculta en móvil pequeño para limpiar espacio */
    }

    /* DISEÑO ESCRITORIO (PANTALLAS GRANDES) */
    @media (min-width: 1024px) {
        .menu-toggle { display: none; }

        .nav-links {
            position: static;
            flex-direction: row;
            width: auto; height: auto;
            background: transparent;
            backdrop-filter: none;
            gap: 2rem;
            margin-left: auto;
            margin-right: auto;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .menu-item { font-size: 10px; }

        .btn-contact {
            display: block;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            order: 3;
        }
    }
</style>

<script>
    const menuToggle = document.getElementById('mobile-menu');
    const navLinks = document.getElementById('nav-links');

    menuToggle.addEventListener('click', () => {
        menuToggle.classList.toggle('open');
        navLinks.classList.toggle('active');
    });

    // Cerrar el menú al hacer clic en un enlace (importante para móviles)
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            menuToggle.classList.remove('open');
            navLinks.classList.remove('active');
        });
    });
</script>
