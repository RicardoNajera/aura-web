<style>
    :root {
        --blue-aura: #60a5fa;
        --purple-aura: #c084fc;
    }

    /* 1. Animación del Logo: Azul a Morado Aura */
    .aura-brand-anim {
        background: linear-gradient(90deg, var(--blue-aura), var(--purple-aura), var(--blue-aura));
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: aura-flow 4s linear infinite;
        font-weight: 900;
        font-style: italic;
        font-size: 1.5rem;
        letter-spacing: -0.05em;
        text-shadow: 0 0 15px rgba(96, 165, 250, 0.2);
    }

    @keyframes aura-flow {
        to { background-position: 200% center; }
    }

    /* 2. Estructura Inteligente y Adaptativa */
    #main-nav {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000; /* Asegura prioridad sobre cualquier elemento */
        padding: 24px 5%;
        background: transparent;
        /* La transición se activa vía JS para evitar el glitch de carga */
    }

    /* 3. Navegación Central Inmersiva */
    .nav-links-wrapper {
        display: flex;
        gap: 2.5rem;
    }

    .menu-item {
        font-size: 10px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.3em;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
    }

    .menu-item:hover {
        color: #ffffff;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
    }

    /* Línea indicadora inteligente */
    .menu-item::after {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 50%;
        width: 0;
        height: 1px;
        background: linear-gradient(90deg, var(--blue-aura), var(--purple-aura));
        transition: all 0.3s ease;
        transform: translateX(-50%);
    }

    .menu-item:hover::after {
        width: 100%;
    }

    /* 4. Botón de Contacto de Alto Nivel */
    .btn-contact {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0.8rem 2.2rem;
        border-radius: 9999px;
        color: white;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        justify-self: end;
    }

    .btn-contact:hover {
        background: white;
        color: black;
        border-color: white;
        transform: scale(1.05);
        box-shadow: 0 10px 30px rgba(96, 165, 250, 0.3);
    }

    /* 5. Adaptabilidad para Móviles */
    @media (max-width: 768px) {
        #main-nav {
            grid-template-columns: 1fr 1fr;
            padding: 15px 20px;
        }
        .nav-links-wrapper {
            display: none; /* Oculta links centrales en móvil para limpieza */
        }
    }
</style>

<nav id="main-nav">
    <div class="flex justify-start">
        <a href="index.html" class="aura-brand-anim">AURA</a>
    </div>
    
    <div class="nav-links-wrapper">
        <a href="index.html" class="menu-item">Home</a>
        <a href="index.html#servicios" class="menu-item">Sistemas</a>
        <a href="nosotros.html" class="menu-item">Concepto</a>
    </div>

    <div class="flex justify-end">
        <a href="https://wa.me/9861197993" class="btn-contact">
            CONTÁCTANOS
        </a>
    </div>
</nav>

<script>
    (function() {
        const nav = document.getElementById('main-nav');
        
        function updateNav() {
            if (!nav) return;

            if (window.scrollY > 40) {
                nav.style.background = "rgba(0, 0, 0, 0.7)";
                nav.style.backdropFilter = "blur(20px) saturate(180%)";
                nav.style.paddingTop = "15px";
                nav.style.paddingBottom = "15px";
                nav.style.borderBottom = "1px solid rgba(255, 255, 255, 0.08)";
                nav.style.boxShadow = "0 10px 30px rgba(0, 0, 0, 0.5)";
            } else {
                nav.style.background = "transparent";
                nav.style.backdropFilter = "none";
                nav.style.paddingTop = "24px";
                nav.style.paddingBottom = "24px";
                nav.style.borderBottom = "none";
                nav.style.boxShadow = "none";
            }
        }

        // Activación de transiciones diferida para evitar saltos visuales al cargar
        setTimeout(() => {
            if(nav) nav.style.transition = "all 0.5s cubic-bezier(0.23, 1, 0.32, 1)";
        }, 100);

        window.addEventListener('scroll', updateNav);
        updateNav(); // Ejecución inmediata para detectar posición inicial
    })();
</script>
