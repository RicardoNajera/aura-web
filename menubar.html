<style>

    }

    #main-nav {

        transition: all 0.4s ease;
    }

    .aura-brand-anim {
        background: linear-gradient(90deg, #fff, var(--blue-aura), var(--purple-aura), #fff);

        -webkit-text-fill-color: transparent;
        animation: aura-flow 5s linear infinite;
        font-weight: 800;
        font-size: 1.6rem;
        text-decoration: none;
        letter-spacing: -0.03em;
        flex-shrink: 0;
    }

    .nav-links {
        display: flex;
        align-items: center;
        gap: clamp(15px, 2vw, 30px);
        margin: 0 20px;
    }

    .menu-item {
        font-size: clamp(11px, 0.75vw, 13px); /* Ajustado para mejor legibilidad */
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        white-space: nowrap;
        transition: all 0.3s ease;
    }

    .menu-item:hover {
        color: #fff;
        text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .nav-actions {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-shrink: 0;
    }

        font-size: 11px;
        font-weight: 700;
        padding: 0.8rem 1.6rem;
        border-radius: 50px;

        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 0.3s ease;

        z-index: 1001;
    }

    .menu-toggle span {
        display: block;
        width: 24px;

        background: #fff;
        transition: 0.3s;
    }

    @media (max-width: 1100px) {

        .menu-item { font-size: 1.5rem; letter-spacing: 0.2em; }

    }
