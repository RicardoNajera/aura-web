<style>
    :root {
        --blue-aura: #60a5fa;
        --purple-aura: #c084fc;
        --glass-bg: rgba(10, 10, 15, 0.85);
        --glass-border: rgba(255, 255, 255, 0.12);
    }

    #main-nav {
        position: fixed;
        top: 0; left: 0; width: 100%;
        z-index: 1000;
        padding: 12px 3%; /* Padding reducido para ganar espacio */
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-bottom: 1px solid var(--glass-border);
    }

    .aura-brand-anim {
        background: linear-gradient(90deg, #fff, var(--blue-aura), var(--purple-aura), #fff);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: aura-flow 5s linear infinite;
        font-weight: 900;
        font-size: 1.3rem;
        text-decoration: none;
        z-index: 1100;
        flex-shrink: 0;
    }

    /* NAV LINKS: MAGIA PARA QUE QUEDE EN UNA FILA */
    .nav-links {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: clamp(0.5rem, 1.5vw, 1.5rem); /* Espaciado inteligente que se encoge */
        flex-grow: 1;
        margin: 0 10px;
    }

    .menu-item {
        font-size: clamp(8px, 0.8vw, 10px); /* El texto se hace más pequeño antes de romperse */
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        white-space: nowrap; /* Prohibido saltar de línea */
        transition: all 0.3s ease;
    }

    .menu-toggle { display: none; } /* Oculto por defecto */

    .btn-contact {
        font-size: clamp(8px, 0.7vw, 10px);
        padding: 0.6rem 1.2rem;
        border-radius: 50px;
        color: white;
        text-decoration: none;
        background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
        border: 1px solid rgba(255, 255, 255, 0.2);
        white-space: nowrap;
        flex-shrink: 0;
    }

    /* CUANDO DE PLANO NO CABE (Móviles pequeños) */
    @media (max-width: 850px) {
        .nav-links {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; height: 100vh;
            background: var(--glass-bg);
            flex-direction: column;
            gap: 2rem;
            margin: 0;
            backdrop-filter: blur(30px);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-links.active { right: 0; }

        .menu-item { font-size: 14px; letter-spacing: 0.3em; }

        .menu-toggle {
            display: block;
            cursor: pointer;
            z-index: 1100;
        }

        .menu-toggle span {
            display: block;
            width: 25px; height: 2px;
            background: #fff;
            margin: 5px 0;
            transition: 0.3s;
        }

        .btn-contact { display: none; } /* En móvil se oculta el botón para no saturar */
    }

    @keyframes aura-flow { to { background-position: 200% center; } }
</style>

<script>
    const menuToggle = document.getElementById('mobile-menu');
    const navLinks = document.getElementById('nav-links');

    menuToggle.addEventListener('click', () => {
        menuToggle.classList.toggle('open');
        navLinks.classList.toggle('active');
    });

    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            navLinks.classList.remove('active');
        });
    });
</script>
